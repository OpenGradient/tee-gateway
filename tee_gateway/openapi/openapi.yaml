openapi: 3.0.0
info:
  title: OpenGradient TEE Gateway
  version: 1.0.0
  description: |
    A secure LLM routing service running inside an AWS Nitro Enclave TEE (Trusted
    Execution Environment). Provides an OpenAI-compatible API for multi-provider LLM
    inference with cryptographically signed responses and remote attestation.

    Every response includes `tee_*` fields that prove the response was generated
    inside the enclave and was not tampered with:

    - `tee_request_hash` — keccak256 of the canonicalized request JSON
    - `tee_output_hash` — keccak256 of the response content
    - `tee_signature` — RSA-PSS-SHA256 over `keccak256(requestHash || outputHash || timestamp)`
    - `tee_timestamp` — Unix timestamp when the response was signed
    - `tee_id` — keccak256 of the enclave's DER-encoded public key

    Access is gated by [x402](https://github.com/opengradient/x402) micropayments.
    Clients pay per request using OPG tokens on Base (mainnet or testnet) via an
    EVM permit2 upto-scheme session. There are no bearer tokens — the `Authorization`
    header declared here is a passthrough; authentication is handled entirely by the
    payment middleware.

    For attestation and signature verification see:
    - `GET /signing-key` — TEE public key (PEM) and tee_id
    - `GET /enclave/attestation` — Nitro attestation document (served by nitriding on port 443)
  contact:
    name: OpenGradient
    url: https://opengradient.ai
  license:
    name: MIT

servers:
  - url: /v1
    description: TEE Gateway (base path used for API routing)

security:
  - ApiKeyAuth: []

tags:
  - name: Chat
    description: |
      Chat completions routed to OpenAI, Anthropic, Google Gemini, or xAI Grok
      based on the model name. Supports streaming (SSE), tool/function calling,
      and structured output (json_schema / json_object). Every response is signed
      inside the enclave.
  - name: Completions
    description: |
      Legacy text completions. The prompt is sent as a single human message to the
      underlying chat model. Every response is signed inside the enclave.

paths:
  /chat/completions:
    post:
      x-openapi-router-controller: tee_gateway.controllers.chat_controller
      operationId: create_chat_completion
      summary: Create a chat completion
      description: |
        Routes the request to the appropriate LLM provider based on the `model`
        field, then signs the response inside the Nitro Enclave. Supports both
        streaming (SSE) and non-streaming responses.

        **Supported models:**

        | Provider | Models |
        |----------|--------|
        | OpenAI | gpt-4.1, gpt-5, gpt-5-mini, gpt-5.2, o4-mini |
        | Anthropic | claude-sonnet-4-5, claude-sonnet-4-6, claude-haiku-4-5, claude-opus-4-5, claude-opus-4-6 |
        | Google | gemini-2.5-flash, gemini-2.5-flash-lite, gemini-2.5-pro, gemini-3-flash-preview |
        | xAI | grok-4, grok-4-fast, grok-4-1-fast, grok-4-1-fast-non-reasoning |
      tags:
        - Chat
      requestBody:
        required: true
        x-body-name: body
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatCompletionRequest"
            examples:
              basic:
                summary: Basic chat completion
                value:
                  model: gpt-4.1
                  messages:
                    - role: user
                      content: "Hello!"
                  temperature: 0.7
              streaming:
                summary: Streaming chat completion
                value:
                  model: gemini-2.5-flash
                  messages:
                    - role: user
                      content: "Write a haiku"
                  stream: true
              with_tools:
                summary: Chat completion with tool use
                value:
                  model: claude-sonnet-4-6
                  messages:
                    - role: user
                      content: "What's the weather in Boston?"
                  tools:
                    - type: function
                      function:
                        name: get_weather
                        description: Get the current weather for a location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                          required: [location]
      responses:
        "200":
          description: |
            Chat completion response. Non-streaming responses include all `tee_*`
            signing fields. Streaming (SSE) responses emit delta chunks followed
            by a final chunk containing the `tee_*` fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChatCompletionResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ChatCompletionStreamResponse"
        "402":
          description: Payment required — x402 payment header missing or insufficient.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequiredError"
        "415":
          description: Unsupported Media Type — request body must be application/json.
        "500":
          description: Internal server error.

  /completions:
    post:
      x-openapi-router-controller: tee_gateway.controllers.completions_controller
      operationId: create_completion
      summary: Create a text completion
      description: |
        Legacy text completion endpoint. The `prompt` string is sent as a single
        human message to the underlying chat model. The response is signed inside
        the Nitro Enclave.
      tags:
        - Completions
      requestBody:
        required: true
        x-body-name: body
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompletionRequest"
            examples:
              basic:
                summary: Basic text completion
                value:
                  model: claude-sonnet-4-6
                  prompt: "Explain quantum computing in one sentence"
                  temperature: 0.7
      responses:
        "200":
          description: Text completion response with TEE signing fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCompletionResponse"
        "402":
          description: Payment required — x402 payment header missing or insufficient.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequiredError"
        "415":
          description: Unsupported Media Type — request body must be application/json.
        "500":
          description: Internal server error.

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      x-bearerInfoFunc: tee_gateway.controllers.security_controller.info_from_ApiKeyAuth
      description: |
        Passthrough — this gateway uses x402 micropayments for access control,
        not bearer tokens. The security handler always accepts any value here.

  schemas:
    # -------------------------------------------------------------------------
    # Request schemas
    # -------------------------------------------------------------------------

    CreateChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      additionalProperties: true
      properties:
        model:
          type: string
          description: |
            Model name. Determines the LLM provider. Must be one of the supported
            model names listed in the endpoint description.
          example: gpt-4.1
        messages:
          type: array
          description: Conversation history in OpenAI message format.
          items:
            $ref: "#/components/schemas/ChatCompletionRequestMessage"
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 2
          default: 1
          description: Sampling temperature. Note — some models (e.g. o4-mini) fix this to 1.
        max_tokens:
          type: integer
          description: Maximum tokens to generate. Defaults to 4096 if omitted.
        stream:
          type: boolean
          default: false
          description: |
            If true, partial message deltas are sent as SSE events. The final SSE
            chunk contains the `tee_*` signing fields.
        tools:
          type: array
          description: List of tools (functions) the model may call.
          items:
            $ref: "#/components/schemas/ChatCompletionTool"
        tool_choice:
          description: Controls which tool (if any) the model calls.
          oneOf:
            - type: string
              enum: [none, auto, required]
            - $ref: "#/components/schemas/ChatCompletionNamedToolChoice"
        response_format:
          $ref: "#/components/schemas/ResponseFormat"
        stop:
          description: Up to 4 stop sequences.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
              maxItems: 4
        n:
          type: integer
          default: 1
          description: Number of completions to generate (only 1 is returned).
        frequency_penalty:
          type: number
          default: 0
        presence_penalty:
          type: number
          default: 0
        top_p:
          type: number
          default: 1
        seed:
          type: integer
        user:
          type: string

    CreateCompletionRequest:
      type: object
      required:
        - model
        - prompt
      additionalProperties: true
      properties:
        model:
          type: string
          description: Model name (same set as for chat completions).
          example: claude-sonnet-4-6
        prompt:
          type: string
          description: The prompt text to complete.
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 2
          default: 1
        max_tokens:
          type: integer
          description: Maximum tokens to generate. Defaults to 4096 if omitted.
        stop:
          description: Up to 4 stop sequences.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
              maxItems: 4

    # -------------------------------------------------------------------------
    # Response schemas
    # -------------------------------------------------------------------------

    CreateChatCompletionResponse:
      type: object
      required:
        - id
        - object
        - created
        - model
        - choices
      additionalProperties: true
      properties:
        id:
          type: string
          description: Unique identifier for this completion (e.g. `chatcmpl-<uuid>`).
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix timestamp of when the completion was created.
        model:
          type: string
          description: Model name echoed from the request.
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionChoice"
        usage:
          $ref: "#/components/schemas/CompletionUsage"
        tee_signature:
          type: string
          description: |
            Base64-encoded RSA-PSS-SHA256 signature over
            `keccak256(tee_request_hash || tee_output_hash || tee_timestamp_bytes)`.
            Verify using the public key from `GET /signing-key`.
        tee_request_hash:
          type: string
          description: |
            Hex-encoded keccak256 hash of the canonicalized request JSON
            (JSON-serialized with sorted keys). Proves the input was not modified.
        tee_output_hash:
          type: string
          description: |
            Hex-encoded keccak256 hash of the response content (or serialized
            tool calls for tool-call responses). Proves the output was not modified.
        tee_timestamp:
          type: integer
          description: Unix timestamp when the response was signed inside the enclave.
        tee_id:
          type: string
          description: |
            Hex string (`0x...`) — keccak256 of the enclave's DER-encoded public key.
            Stable identifier for this enclave instance across requests.

    ChatCompletionStreamResponse:
      type: object
      description: |
        A single SSE chunk emitted during a streaming chat completion. Regular
        chunks carry `choices[].delta`. The final chunk (before `[DONE]`) has
        `choices[].finish_reason` set and includes the `tee_*` signing fields.
      additionalProperties: true
      properties:
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionStreamChoice"
        model:
          type: string
        usage:
          $ref: "#/components/schemas/CompletionUsage"
        tee_signature:
          type: string
        tee_request_hash:
          type: string
        tee_output_hash:
          type: string
        tee_timestamp:
          type: integer
        tee_id:
          type: string

    CreateCompletionResponse:
      type: object
      required:
        - id
        - object
        - created
        - model
        - choices
      additionalProperties: true
      properties:
        id:
          type: string
          description: Unique identifier for this completion (e.g. `cmpl-<uuid>`).
        object:
          type: string
          enum: [text_completion]
        created:
          type: integer
          description: Unix timestamp of when the completion was created.
        model:
          type: string
        choices:
          type: array
          items:
            $ref: "#/components/schemas/CompletionChoice"
        usage:
          $ref: "#/components/schemas/CompletionUsage"
        tee_signature:
          type: string
          description: Base64-encoded RSA-PSS-SHA256 signature (see chat completion schema).
        tee_request_hash:
          type: string
        tee_output_hash:
          type: string
        tee_timestamp:
          type: integer
        tee_id:
          type: string

    # -------------------------------------------------------------------------
    # Shared message / choice schemas
    # -------------------------------------------------------------------------

    ChatCompletionRequestMessage:
      type: object
      required:
        - role
      additionalProperties: true
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool, function]
        content:
          description: Message content (string or array of content parts).
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
        name:
          type: string
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionMessageToolCall"
        tool_call_id:
          type: string
          description: "Required for role=tool messages."

    ChatCompletionMessageToolCall:
      type: object
      required:
        - id
        - type
        - function
      properties:
        id:
          type: string
        type:
          type: string
          enum: [function]
        function:
          type: object
          required:
            - name
            - arguments
          properties:
            name:
              type: string
            arguments:
              type: string
              description: JSON-serialized arguments for the function.

    ChatCompletionTool:
      type: object
      required:
        - type
        - function
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          required:
            - name
          additionalProperties: true
          properties:
            name:
              type: string
            description:
              type: string
            parameters:
              type: object
              description: JSON Schema describing the function parameters.
              additionalProperties: true

    ChatCompletionNamedToolChoice:
      type: object
      required:
        - type
        - function
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          required:
            - name
          properties:
            name:
              type: string

    ResponseFormat:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          enum: [text, json_object, json_schema]
          description: |
            `text` (default) — plain text response.
            `json_object` — response is valid JSON (model must be prompted with "json").
            `json_schema` — response matches the provided schema. Anthropic models use
            native structured output; other providers use `bind(response_format=...)`.
        json_schema:
          type: object
          additionalProperties: true
          description: |
            Required when `type` is `json_schema`. Contains `name`, `schema`
            (a JSON Schema object), and optionally `strict`.

    ChatCompletionChoice:
      type: object
      properties:
        index:
          type: integer
        message:
          type: object
          additionalProperties: true
          properties:
            role:
              type: string
            content:
              type: string
              nullable: true
            tool_calls:
              type: array
              items:
                $ref: "#/components/schemas/ChatCompletionMessageToolCall"
        finish_reason:
          type: string
          enum: [stop, length, tool_calls, content_filter, function_call]
          nullable: true

    ChatCompletionStreamChoice:
      type: object
      properties:
        index:
          type: integer
        delta:
          type: object
          additionalProperties: true
          properties:
            role:
              type: string
            content:
              type: string
              nullable: true
            tool_calls:
              type: array
              items:
                type: object
                additionalProperties: true
        finish_reason:
          type: string
          nullable: true

    CompletionChoice:
      type: object
      properties:
        text:
          type: string
        index:
          type: integer
        finish_reason:
          type: string
          enum: [stop, length]
          nullable: true

    CompletionUsage:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

    PaymentRequiredError:
      type: object
      description: |
        x402 payment required response. The client must attach a valid EVM
        micropayment header and retry.
      properties:
        error:
          type: string
        payment_requirements:
          type: object
          additionalProperties: true
